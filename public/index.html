<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DNS Installer</title>

  <script>
    setTimeout(function() {
      window.location.href = "/dns.mobileconfig";
    }, 1000);
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      text-align: center;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 12px;
      text-decoration: none;
      background: #007aff;
      color: white;
      font-weight: 600;
      margin: 10px;
    }

    .secondary {
      background: #555;
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }

    .section {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>📡 DNS Installer</h1>

  <p>Preparing DNS installation…</p>

  <a class="button" href="/dns.mobileconfig">
    Install DNS Profile
  </a>

  <div class="section">
    <a class="button secondary" href="/cert.zip" download>
      📦 Download Certificate (.zip)
    </a>
  </div>

  <div class="section">
    <a class="button secondary" href="https://github.com/CLARATION/Feather/releases/latest/download/Feather.ipa">
      🛠 Download Feather (latest)
    </a>
  </div>

  <p class="note">
    After installing DNS:<br>
    Go to <b>Settings → Profile Downloaded → Install</b>
  </p>

</body>
</html>
